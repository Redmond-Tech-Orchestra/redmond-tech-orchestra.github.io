<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redmond Tech Orchestra</title>
    <script>
      // Single-Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      //
      // GitHub Pages doesn't know about client-side routes, so it serves this
      // 404 page for any unknown path. We rewrite the URL into a single
      // query string and bounce to /, where index.html decodes it back into
      // a real path before BrowserRouter mounts.
      (function () {
        var pathSegmentsToKeep = 0; // site lives at the domain root
        var l = window.location;
        l.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
