    <title>Redmond Tech Orchestra</title>
    <script>
      // Single-Page Apps for GitHub Pages — decode the path encoded by 404.html
      // back into a real URL so BrowserRouter sees the original route.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search.slice(1).split("&").map(function (s) {
            return s.replace(/~and~/g, "&");
          }).join("?");
          window.history.replaceState(null, "", l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
